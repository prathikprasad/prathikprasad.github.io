<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HASY Mean Hand Gallery</title>
  <link rel="stylesheet" href="web_fonts/mean_hand_symbols.css">
  <style>
    :root { color-scheme: light; font-family: Inter, Arial, sans-serif; background: #f2f0ea; color: #161616; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header { position: sticky; top: 0; z-index: 2; padding: 10px 16px; background: rgba(242,240,234,.95); border-bottom: 1px solid #c9c5ba; backdrop-filter: blur(10px); }
    h1 { margin: 0 0 2px; font-size: clamp(20px, 3vw, 30px); font-weight: 500; letter-spacing: -.04em; }
    .subtitle { margin: 0 0 8px; color: #5b5952; font-size: 13px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; }
    button, input, select { min-height: 32px; border: 1px solid #aaa69b; border-radius: 999px; background: #fff; padding: 0 12px; font: inherit; font-size: 13px; }
    button { cursor: pointer; }
    button.active { background: #171717; color: #fff; border-color: #171717; }
    input { width: min(320px, 100%); }
    main { padding: 12px 16px; }
    .status { margin: 0 0 8px; color: #5b5952; font-size: 12px; }
    .character-list, .weight-grid { display: grid; gap: 8px; }
    .character-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .category-section { margin: 0 0 10px; }
    .category-section > summary { margin: 0 0 7px; padding: 5px 7px; border-bottom: 1px solid #aaa69b; font-size: 15px; font-weight: 600; cursor: pointer; }
    .category-section:not([open]) > summary { margin-bottom: 0; }
    .category-count { color: #77736a; font-size: 11px; font-weight: 400; }
    .character-card, .weight-card { background: #fff; border: 1px solid #d4d0c7; border-radius: 8px; overflow: hidden; }
    .character-card h2, .weight-card h3 { min-height: 28px; margin: 0; padding: 3px 7px; border-bottom: 1px solid #e2ded6; font: 600 18px/1.2 Georgia, serif; text-align: center; overflow-wrap: anywhere; }
    .label-preview { width: 22px; height: 22px; vertical-align: middle; }
    .variants { display: grid; grid-template-columns: repeat(10, minmax(48px, 1fr)); overflow-x: auto; }
    figure { min-width: 48px; margin: 0; padding: 4px 2px; text-align: center; border-right: 1px solid #eeeae2; }
    figure:last-child { border-right: 0; }
    img { width: 36px; height: 36px; object-fit: contain; image-rendering: auto; background: #fff; }
    figcaption { margin-top: 2px; color: #66625a; font-size: 8px; text-transform: capitalize; white-space: nowrap; }
    .weight-section { margin-bottom: 10px; }
    .weight-section > summary { position: sticky; top: 103px; z-index: 1; margin: 0 0 6px; padding: 7px 9px; border: 1px solid #d4d0c7; border-radius: 8px; background: #f2f0ea; font-size: 16px; font-weight: 600; text-transform: capitalize; cursor: pointer; }
    .weight-section:not([open]) > summary { margin-bottom: 0; }
    .weight-grid { grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); }
    .weight-card { text-align: center; }
    .weight-card img { width: 48px; height: 48px; margin: 6px; }
    .empty { padding: 80px 20px; text-align: center; color: #66625a; }
    .tester { display: grid; gap: 12px; }
    .tester-controls { display: flex; align-items: center; gap: 8px; }
    .tester textarea { width: 100%; min-height: 55vh; resize: vertical; border: 1px solid #aaa69b; border-radius: 12px; background: #fff; padding: 24px; font-family: 'Mean Hand Symbols', sans-serif; font-size: clamp(48px, 8vw, 96px); line-height: 1.35; font-weight: 400; }
    @media (max-width: 900px) { .character-list { grid-template-columns: 1fr; } }
    @media (max-width: 700px) { header, main { padding-left: 10px; padding-right: 10px; } .weight-section > summary { top: 139px; } }
  </style>
</head>

  <header>
    <h1>HASY Mean Hand</h1>
    <p class="subtitle" id="subtitle">369 characters · full-dataset mean + nine consensus weights</p>
    <div class="controls">
      <button class="active" data-dataset="hasy">HASY</button>
      <button data-dataset="kaggle">Kaggle supplemental</button>
      <button data-dataset="uji">UJI punctuation</button>
      <button class="active" data-mode="character">Group by character</button>
      <button data-mode="weight">Group by weight</button>
      <button data-mode="tester">Type tester</button>
      <input id="search" type="search" placeholder="Filter character" aria-label="Filter characters">
    </div>
  </header>
  <main>
    <p class="status" id="status"></p>
    <div id="gallery"></div>

    let dataset = 'hasy';

    const title = value => value.replaceAll('_', ' ');
    const escapeHtml = value => String(value).replace(/[&<>"']/g, char => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[char]));
    const symbolLabel = item => item.display ? escapeHtml(item.display) : `<img class="label-preview" src="${item.images.mean}" alt="Character">`;
    const image = (item, weight) => `<figure><img loading="lazy" src="${item.images[weight]}" alt="Character, ${title(weight)}"><figcaption>${title(weight)}</figcaption></figure>`;
    const sourceItems = () => ({hasy: DATA.items, kaggle: DATA.supplemental, uji: DATA.uji}[dataset]);
    const matching = () => {
      const query = search.value.trim().toLowerCase();
      return sourceItems().filter(item => !query || item.label.toLowerCase().includes(query) || item.display.toLowerCase().includes(query));
    };
    const grouped = items => DATA.categories.map(category => ({category, items: items.filter(item => item.category === category)})).filter(group => group.items.length);
    const heading = group => `<summary>${escapeHtml(group.category)} <span class="category-count">${group.items.length}</span></summary>`;

    function render() {
      if (mode === 'tester') {
        subtitle.textContent = 'Type with the unified nine-weight webfont';
        status.textContent = 'Characters missing from the font use the browser fallback font.';
        gallery.innerHTML = `<section class="tester"><div class="tester-controls"><label for="tester-weight">Weight</label><select id="tester-weight">${[['Thin',100],['Extra Light',200],['Light',300],['Regular',400],['Medium',500],['Semi Bold',600],['Bold',700],['Extra Bold',800],['Black',900]].map(([name, value]) => `<option value="${value}"${value === 400 ? ' selected' : ''}>${name}</option>`).join('')}</select></div><textarea id="font-tester" aria-label="Font tester" spellcheck="false">A + B = π\n√∞ ∑ ∫ cos sin log lim</textarea></section>`;
        const tester = document.querySelector('#font-tester');
        document.querySelector('#tester-weight').addEventListener('change', event => tester.style.fontWeight = event.target.value);
        return;
      }
      const source = sourceItems();
      const items = matching();
      subtitle.textContent = `${source.length} characters · full-dataset mean + nine consensus weights`;
      status.textContent = `${items.length} of ${source.length} characters shown`;
      if (!items.length) { gallery.innerHTML = '<div class="empty">No matching characters.</div>'; return; }
      if (mode === 'character') {
        gallery.innerHTML = grouped(items).map(group => `<details class="category-section" open>${heading(group)}<div class="character-list">${group.items.map(item => `<article class="character-card"><h2>${symbolLabel(item)}</h2><div class="variants">${DATA.weights.map(weight => image(item, weight)).join('')}</div></article>`).join('')}</div></details>`).join('');
      } else {
        gallery.innerHTML = DATA.weights.map(weight => `<details class="weight-section" open><summary>${title(weight)}</summary>${grouped(items).map(group => `<details class="category-section" open>${heading(group)}<div class="weight-grid">${group.items.map(item => `<article class="weight-card"><h3>${symbolLabel(item)}</h3><img loading="lazy" src="${item.images[weight]}" alt="Character, ${title(weight)}"></article>`).join('')}</div></details>`).join('')}</details>`).join('');
      }
    }

    document.querySelectorAll('[data-mode]').forEach(button => button.addEventListener('click', () => {
      mode = button.dataset.mode;
      document.querySelectorAll('[data-mode]').forEach(item => item.classList.toggle('active', item === button));
      document.querySelectorAll('[data-dataset], #search').forEach(item => item.hidden = mode === 'tester');
      render();
    }));
    document.querySelectorAll('[data-dataset]').forEach(button => button.addEventListener('click', () => {
      dataset = button.dataset.dataset;
      search.value = '';
      document.querySelectorAll('[data-dataset]').forEach(item => item.classList.toggle('active', item === button));
      render();
    }));
    search.addEventListener('input', render);
    render();
  </script>
</body>
</html>
